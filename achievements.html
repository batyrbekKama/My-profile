<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Батырбек | Достижения</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    /* ТОЧНО ТАКОЙ ЖЕ <style> как в index.html выше — скопируй полностью */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    :root { --neon: #00f5ff; }
    body { font-family: 'Inter', sans-serif; }
    .hero-font { font-family: 'Space Grotesk', sans-serif; }
    .glass { background: rgba(255,255,255,0.07); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.15); }
    .neon-text { text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon), 0 0 70px #ff00ff; }
    .card-hover { transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    .card-hover:hover { transform: translateY(-25px) rotate(3deg) scale(1.05); box-shadow: 0 0 80px rgba(0,245,255,0.5); }
    .nav-link { position: relative; }
    .nav-link:after { content:''; position:absolute; width:0; height:3px; bottom:-6px; left:0; background:linear-gradient(to right,#00f5ff,#ff00ff); transition:width 0.4s; }
    .nav-link:hover:after, .nav-link.active:after { width:100%; }
  </style>
</head>
<body class="bg-gradient-to-br from-[#0a0a2e] via-[#1a0033] to-[#2a0044] text-white min-h-screen">

  <!-- ТА ЖЕ НАВИГАЦИЯ -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass py-6">
    <div class="max-w-7xl mx-auto px-8 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-3xl flex items-center justify-center text-3xl shadow-[0_0_40px_#00f5ff]">👾</div>
        <span class="text-4xl font-bold hero-font tracking-tighter neon-text">БАТЫРБЕК</span>
      </div>
      <div class="hidden md:flex gap-12 text-xl">
        <a href="index.html" class="nav-link">Обо мне</a>
        <a href="achievements.html" class="nav-link active">Достижения</a>
        <a href="education.html" class="nav-link">Учёба</a>
        <a href="thanks.html" class="nav-link">Спасибо</a>
      </div>
      <button onclick="toggleMusic()" class="text-3xl hover:scale-125 transition">🎵</button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-8 pt-32 pb-20">
    <h2 class="text-8xl font-black hero-font text-center neon-text mb-20">МОИ ТРОФЕИ 🏆</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
      <div class="glass rounded-3xl p-12 text-center card-hover"><div class="text-7xl text-cyan-400 counter" data-count="1">0</div><p class="text-3xl font-bold mt-4">ХАКатон 2025</p><p class="text-gray-400">1 место • Павлодар</p></div>
      <div class="glass rounded-3xl p-12 text-center card-hover"><div class="text-7xl text-purple-400 counter" data-count="7">0</div><p class="text-3xl font-bold mt-4">Проектов</p></div>
      <div class="glass rounded-3xl p-12 text-center card-hover"><div class="text-7xl text-pink-400 counter" data-count="4.9">0</div><p class="text-3xl font-bold mt-4">GPA</p></div>
      <div class="glass rounded-3xl p-12 text-center card-hover"><div class="text-7xl text-emerald-400 counter" data-count="420">0</div><p class="text-3xl font-bold mt-4">Часов кодинга</p></div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.counter').forEach(el => {
      const target = parseFloat(el.getAttribute('data-count'));
      let count = 0;
      const int = setInterval(() => {
        count += target / 80;
        if(count >= target) { count = target; clearInterval(int); }
        el.textContent = count % 1 === 0 ? count : count.toFixed(1);
      }, 25);
    });
    let audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
    function toggleMusic() { audio.paused ? audio.play() : audio.pause(); }
  </script>
</body>
</html>
