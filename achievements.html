<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Батырбек | Достижения</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <!-- Вставь ВЕСЬ <style> из index.html сюда -->
  <style> /* тот же стиль что выше */ </style>
</head>
<body class="bg-gradient-to-br from-[#0a0a2e] via-[#1a0033] to-[#2a0044] text-white">

  <!-- Вставь полностью блок <nav> из index.html (только поменяй active на достижения) -->

  <div class="max-w-7xl mx-auto px-8 pt-32">
    <h2 class="text-8xl font-black hero-font text-center neon-text mb-20">МОИ ТРОФЕИ 🏆</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
      <div class="glass rounded-3xl p-12 text-center card-hover">
        <div class="text-7xl text-cyan-400 counter" data-count="1">0</div>
        <p class="text-3xl font-bold mt-4">ХАКатон 2025</p>
        <p class="text-gray-400">1 место • Павлодар..</p>
      </div>
      <div class="glass rounded-3xl p-12 text-center card-hover">
        <div class="text-7xl text-purple-400 counter" data-count="7">0</div>
        <p class="text-3xl font-bold mt-4">Проектов</p>
      </div>
      <div class="glass rounded-3xl p-12 text-center card-hover">
        <div class="text-7xl text-pink-400 counter" data-count="4.9">0</div>
        <p class="text-3xl font-bold mt-4">GPA</p>
      </div>
      <div class="glass rounded-3xl p-12 text-center card-hover">
        <div class="text-7xl text-emerald-400 counter" data-count="420">0</div>
        <p class="text-3xl font-bold mt-4">Часов кодинга</p>
      </div>
    </div>
  </div>

  <script>
    // Анимированные счётчики (тот же код что раньше + вызов после загрузки)
    document.querySelectorAll('.counter').forEach(el => {
      const target = parseFloat(el.getAttribute('data-count'));
      let count = 0;
      const step = target / 80;
      const int = setInterval(() => {
        count += step;
        if(count >= target) { count = target; clearInterval(int); }
        el.textContent = count % 1 === 0 ? count : count.toFixed(1);
      }, 25);
    });
  </script>
</body>
</html>
