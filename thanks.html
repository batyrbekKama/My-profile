<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Батырбек | Спасибо!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <!-- style + nav -->
</head>
<body class="bg-gradient-to-br from-[#0a0a2e] via-[#1a0033] to-[#2a0044] text-white min-h-screen flex items-center">

  <!-- nav с active -->

  <div class="max-w-3xl mx-auto text-center px-8">
    <h2 class="text-8xl md:text-[120px] font-black hero-font neon-text mb-8">СПАСИБО!</h2>
    
    <div class="glass rounded-3xl p-16">
      <img src="https://media.giphy.com/media/l3q2K5a4v1z9z9z9z/giphy.gif" 
           class="mx-auto w-96 rounded-3xl shadow-2xl mb-12" alt="танцующий котик">
      
      <p class="text-4xl mb-10">Ты дошёл до конца. Это уже круто.<br>Пиши мне в любое время — отвечу за 5 минут 😎</p>
      
      <div class="flex justify-center gap-8 text-6xl">
        <a href="https://t.me/твойник" class="hover:text-cyan-400 transition">📱</a>
        <a href="https://instagram.com/твойник" class="hover:text-pink-400 transition">📸</a>
      </div>
    </div>
  </div>

  <script>
    // Конфетти каждые 2 секунды
    setInterval(() => {
      confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
    }, 2000);
  </script>
</body>
</html>
