<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Батырбек | Портфолио</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    :root { --neon: #00f5ff; }
    body { font-family: 'Inter', sans-serif; }
    .hero-font { font-family: 'Space Grotesk', sans-serif; }
    .glass { background: rgba(255,255,255,0.07); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.15); }
    .neon-text { text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon), 0 0 70px #ff00ff; }
    .card-hover { transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    .card-hover:hover { transform: translateY(-25px) rotate(3deg) scale(1.05); box-shadow: 0 0 80px rgba(0,245,255,0.5); }
    .nav-link { position: relative; }
    .nav-link:after { content:''; position:absolute; width:0; height:3px; bottom:-6px; left:0; background:linear-gradient(to right,#00f5ff,#ff00ff); transition:width 0.4s; }
    .nav-link:hover:after, .nav-link.active:after { width:100%; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
    .particle { position:fixed; width:4px; height:4px; background:#00f5ff; border-radius:50%; pointer-events:none; z-index:-1; animation:particleAnim 25s linear infinite; }
    @keyframes particleAnim { to { transform:translateY(-100vh) rotate(360deg); opacity:0; } }
  </style>
</head>
<body class="bg-gradient-to-br from-[#0a0a2e] via-[#1a0033] to-[#2a0044] text-white min-h-screen overflow-x-hidden">

  <!-- НАВИГАЦИЯ (одинаковая на всех страницах) -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass py-6">
    <div class="max-w-7xl mx-auto px-8 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-3xl flex items-center justify-center text-3xl shadow-[0_0_40px_#00f5ff]">👾</div>
        <span class="text-4xl font-bold hero-font tracking-tighter neon-text">БАТЫРБЕК</span>
      </div>
      <div class="hidden md:flex gap-12 text-xl">
        <a href="index.html" class="nav-link active">Обо мне</a>
        <a href="achievements.html" class="nav-link">Достижения</a>
        <a href="education.html" class="nav-link">Учёба</a>
        <a href="thanks.html" class="nav-link">Спасибо</a>
      </div>
      <button onclick="toggleMusic()" class="text-3xl hover:scale-125 transition">🎵</button>
    </div>
  </nav>

  <!-- ГЕРОЙ + остальной контент (как раньше, но ещё красивее) -->
  <header class="min-h-screen flex items-center relative pt-20">
    <div id="particles" class="absolute inset-0 pointer-events-none"></div>
    <div class="max-w-7xl mx-auto px-8 grid md:grid-cols-2 gap-16 items-center">
      <div class="space-y-10">
        <div class="inline-flex items-center gap-4 px-8 py-4 glass rounded-3xl">
          <div class="w-5 h-5 bg-green-400 rounded-full animate-pulse"></div>
          <span class="tracking-[4px] text-sm font-medium">ПАВЛОДАР • ONLINE</span>
        </div>
        <h1 class="text-8xl md:text-[110px] font-black hero-font leading-none neon-text">ПРИВЕТ,<br>Я БАТЫРБЕК</h1>
        <p class="text-5xl text-cyan-300 typing font-light">будущий senior dev</p>
        <p class="max-w-lg text-2xl text-gray-300">Кодю ночи напролёт. Люблю React, лоу-фай и когда код работает с первого раза.</p>
        <a href="achievements.html" class="inline-block px-14 py-7 bg-gradient-to-r from-cyan-400 to-purple-600 text-2xl font-bold rounded-3xl shadow-2xl hover:scale-110 transition">СМОТРЕТЬ ТРОФЕИ →</a>
      </div>
      <div class="relative flex justify-center">
        <div class="relative animate-float">
          <div class="absolute inset-0 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-[5rem] blur-3xl opacity-40"></div>
          <img src="https://picsum.photos/id/1011/700/700" alt="Батырбек" class="w-[420px] h-[420px] object-cover rounded-[5rem] border-8 border-white/30 shadow-[0_0_100px_#00f5ff]">
        </div>
      </div>
    </div>
  </header>

  <script>
    function createParticles() {
      for(let i=0; i<60; i++){
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random()*100 + 'vw';
        p.style.animationDuration = (Math.random()*30 + 20) + 's';
        document.getElementById('particles').appendChild(p);
      }
    }
    createParticles();
    let audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
    function toggleMusic() { audio.paused ? audio.play() : audio.pause(); }
  </script>
</body>
</html>
